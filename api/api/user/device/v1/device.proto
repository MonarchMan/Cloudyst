syntax = "proto3";

package user.device.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "user/common/v1/common.proto";

option go_package = "api/api/user/device/v1;v1";

service Device {
  rpc ListDavAccounts(ListDavAccountsRequest) returns(ListDavAccountsResponse) {
    option(google.api.http) = {
      get: "/devices/dav",
    };
  }

  rpc CreateDavAccount(UpsertDavAccountRequest) returns (GetDavAccountResponse) {
    option(google.api.http) = {
      put: "/devices/dav",
      body: "*",
    };
  }

  rpc UpdateDavAccount(UpsertDavAccountRequest) returns (GetDavAccountResponse) {
    option(google.api.http) = {
      patch: "/devices/dav/{id}",
      body: "*",
    };
  }

  rpc DeleteDavAccount(SimpleDavAccountRequest) returns (google.protobuf.Empty) {
    option(google.api.http) = {
      delete: "/devices/dav/{id}",
    };
  }
}

message ListDavAccountsRequest {
  int32 page_size = 1;
  string next_page_token = 2;
}

message ListDavAccountsResponse {
  repeated GetDavAccountResponse dav_accounts = 1;
  user.common.v1.PaginationResults pagination = 2;
}

message UpsertDavAccountRequest {
  string id = 1;
  string uri = 2;
  string name = 3;
  bool read_only = 4;
  bool proxy = 5;
  bool disable_sys_files = 6;
}

message GetDavAccountResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  string name = 3;
  string uri = 4;
  string password = 5;
  optional bytes options = 6;
}

message SimpleDavAccountRequest {
  string id = 1;
}
