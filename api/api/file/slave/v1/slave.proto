syntax = "proto3";

package file.slave.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "file/common/v1/entpb.proto";

option go_package = "api/api/file/slave/v1;v1";

service Slave {
	rpc GetCredential(SimpleSlaveRequest) returns (GetCredentialResponse);

  rpc StatelessPrepareUpload(StatelessPrepareUploadRequest) returns (StatelessPrepareUploadResponse);

  rpc StatelessCompleteUpload(StatelessCompleteUploadRequest) returns (StatelessCompleteUploadResponse);

  rpc StatelessFailUpload(StatelessCompleteUploadRequest) returns (google.protobuf.Empty);

  rpc StatelessCreateFile(StatelessCreateFileRequest) returns (google.protobuf.Empty);

  rpc Upload(SlaveUploadRequest) returns (google.protobuf.Empty);

  rpc CreateUploadSession(CreateUploadSessionRequest) returns (google.protobuf.Empty);

  rpc DeleteUploadSession(DeleteUploadSessionRequest) returns (google.protobuf.Empty);

  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);

  rpc Delete(DeleteRequest) returns (DeleteResponse);

  rpc Ping(PingRequest) returns (google.protobuf.Empty);

  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

message SimpleSlaveRequest {
  string id = 1;
}

message GetCredentialResponse {
  string token = 1;
  google.protobuf.Timestamp expire_at = 2;
}

message StatelessPrepareUploadRequest {
  int32 user_id = 1;
  UploadRequest upload_request = 2;
}

message StatelessPrepareUploadResponse {
  UploadSession upload_session = 1;
  UploadRequest upload_request = 2;
}

message StatelessCompleteUploadRequest {
  int32 user_id = 1;
  UploadSession upload_session = 2;
}

message StatelessCompleteUploadResponse {
  bytes file = 1; // JSON bytes of fs.File
}

message StatelessCreateFileRequest {
  int32 user_id = 1;
  int32 type = 2;
  string path = 3;
}

message UploadRequest {
  UploadProps props = 1;
  int32 write_mode = 2;
  int64 offset = 3;
}

message UploadSession {
  int32 user_id = 1;
  file.common.v1.StoragePolicy policy = 2;
  int32 file_id = 3;
  int32 entity_id = 4;
  string callback = 5;
  string callback_secret = 6;
  string upload_id = 7;
  string upload_url = 8;
  string credential = 9;
  int64 chunk_size = 10;
  int32 sentinel_task_id = 11;
  bool new_file_created = 12;
  bool importing = 13;
  string lock_token = 14;
  UploadProps props = 15;
}

message UploadProps {
  string uri = 1;
  int64 size = 2;
  string upload_session_id = 3;
  int32 preferred_storage_policy = 4;
  string save_path = 5;
  google.protobuf.Timestamp last_modified = 6;
  string mime_type = 7;
  map<string, string> metadata = 8;
  string previous_version = 9;
  optional int32 entity_type = 10;
  google.protobuf.Timestamp expire_at = 11;
}

message SlaveUploadRequest {
  string session_id = 1;
  int32 index = 2;
}

message CreateUploadSessionRequest {
  UploadSession session = 1;
  bool overwrite = 2;
}

message DeleteUploadSessionRequest {
  string session_id = 1;
}

message EntityRequest {
  string name = 1;
  int64 speed = 2;
  string src = 3;
  bool is_download = 4;
}

message GetMetadataRequest {
  string src = 1;
  string ext = 2;
  string language = 3;
}

message GetMetadataResponse {
  repeated MediaMeta meta = 1;
}

message MediaMeta {
  string key = 1;
  string value = 2;
  string type = 3;
}

message GetThumbRequest {
  string src = 1;
  string ext = 2;
}

message DeleteRequest {
  repeated string files = 1;
}

message DeleteResponse {
  repeated string failed = 1;
}

message PingRequest {
  string callback = 1;
}

message ListFilesRequest {
  string path = 1;
  bool recursive = 2;
}

message ListFilesResponse {
  repeated PhysicalObject files = 1;
}

message PhysicalObject {
  string name = 1;
  string source = 2;
  string relative_path = 3;
  int64  size = 4;
  bool is_dir = 5;
  google.protobuf.Timestamp last_modify = 6;
}
