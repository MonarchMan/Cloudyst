syntax = "proto3";

package ai.model.v1;

option go_package = "api/api/ai/model/v1;v1";
option java_multiple_files = true;
option java_package = "ai.model.v1";

import "google/api/annotations.proto";
import "common/v1/common.proto";

service Model {
  rpc ListModel (ListModelRequest) returns (ListModelResponse) {
    option (google.api.http) = {
      get: "/ai/model/list/me"
    };
  }
  rpc GetModel(SimpleRequest) returns (GetModelResponse) {
    option (google.api.http) = {
      get: "/ai/model/{id}"
    };
  }
  rpc GetDefaultModel(DefaultModelRequest) returns (GetModelResponse) {
    option (google.api.http) = {
      get: "/ai/model/default"
    };
  }
}

message SimpleRequest {
  string id = 1;
}

message GetModelResponse {
  string id = 1;
  string name = 2;
  string type = 3;
  string platform = 4;
  double temperature = 5;
  int32 max_tokens = 6;
  int32 max_contexts = 7;
}

message  ListModelRequest {
  common.v1.PaginationArgs pagination = 1;
  string name = 2;
  string type = 3;
  string platform = 4;
}

message ListModelResponse {
  repeated GetModelResponse models = 1;
  common.v1.PaginationResults pagination = 2;
}

message DefaultModelRequest {
  string type = 1;
  string platform = 2;
}