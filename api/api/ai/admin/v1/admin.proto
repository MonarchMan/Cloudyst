syntax = "proto3";

package ai.admin.v1;

option go_package = "api/api/ai/admin/v1;v1";
option java_multiple_files = true;
option java_package = "ai.admin.v1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "common/v1/common.proto";
import "ai/common/v1/entpb.proto";

service Admin {
  // Api Key
  rpc CreateApikey (ai.common.v1.AiApiKey) returns (ai.common.v1.AiApiKey) {
    option (google.api.http) = {
      post: "/ai/admin/api-key"
      body: "*"
    };
  }
  rpc UpdateApikey (ai.common.v1.AiApiKey) returns (ai.common.v1.AiApiKey) {
    option (google.api.http) = {
      put: "/ai/admin/api-key/{id}"
      body: "*"
    };
  };
  rpc DeleteApikey (SimpleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/ai/admin/api-key/{id}"
    };
  };
  rpc GetApikey (SimpleRequest) returns (ai.common.v1.AiApiKey) {
    option (google.api.http) = {
      get: "/ai/admin/api-key/{id}"
    };
  }
  rpc ListApikey (.common.v1.ListRequest) returns (ListApikeyResponse) {
    option (google.api.http) = {
      post: "/ai/admin/api-key/list"
      body: "*"
    };
  };
  rpc BatchDeleteApiKey (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/api-key/delete",
      body: "*"
    };
  }

  // Model
  rpc CreateModel (ai.common.v1.AiModel) returns (ai.common.v1.AiModel) {
    option (google.api.http) = {
      post: "/ai/admin/model"
      body: "*"
    };
  };
  rpc UpdateModel (ai.common.v1.AiModel) returns (ai.common.v1.AiModel) {
    option (google.api.http) = {
      put: "/ai/admin/model/{id}"
      body: "*"
    };
  };
  rpc DeleteModel (SimpleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/ai/admin/model/{id}"
    };
  };
  rpc GetModel (SimpleRequest) returns (ai.common.v1.AiModel) {
    option (google.api.http) = {
      get: "/ai/admin/model/{id}"
    };
  };
  rpc ListModel (.common.v1.ListRequest) returns (ListModelResponse) {
    option (google.api.http) = {
      post: "/ai/admin/model/list"
      body: "*"
    };
  };
  rpc BatchDeleteModel (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/model/delete",
      body: "*"
    };
  }

  // Role
  rpc GetRole (SimpleRequest) returns (Role) {
    option (google.api.http) = {
      get: "/ai/admin/role/{id}"
    };
  };
  rpc ListRole (.common.v1.ListRequest) returns (ListRoleResponse) {
    option (google.api.http) = {
      post: "/ai/admin/role/list"
      body: "*"
    };
  };
  rpc BatchDeleteRole (BatchDeleteRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/role/delete",
      body: "*"
    };
  }
  rpc UpdateRole (ai.common.v1.AiChatRole) returns (Role) {
    option (google.api.http) = {
      put: "/ai/admin/role/{id}"
      body: "*"
    };
  };
  rpc CreateRole (ai.common.v1.AiChatRole) returns (Role) {
    option (google.api.http) = {
      post: "/ai/admin/role"
      body: "*"
    };
  };

  // Knowledge
  rpc GetKnowledge (SimpleRequest) returns (Knowledge) {
    option (google.api.http) = {
      get: "/ai/admin/knowledge/{id}"
    };
  };
  rpc ListKnowledge (.common.v1.ListRequest) returns (ListKnowledgeResponse) {
    option (google.api.http) = {
      post: "/ai/admin/knowledge/list"
      body: "*"
    };
  };
  rpc BatchDeleteKnowledge (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/knowledge/delete",
      body: "*"
    };
  }
  rpc UpdateKnowledge (ai.common.v1.AiKnowledge) returns (Knowledge) {
    option (google.api.http) = {
      put: "/ai/admin/knowledge/{id}"
      body: "*"
    };
  };
  rpc CreateKnowledge (ai.common.v1.AiKnowledge) returns (Knowledge) {
    option (google.api.http) = {
      post: "/ai/admin/knowledge"
      body: "*"
    };
  };

  // Knowledge Document
  rpc BatchDeleteKnowledgeDocument (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/document/delete",
      body: "*"
    };
  }
  rpc GetKnowledgeDocument (SimpleRequest) returns (ai.common.v1.AiKnowledgeDocument) {
    option (google.api.http) = {
      get: "/ai/admin/document/{id}"
    };
  }
  rpc ListKnowledgeDocument (.common.v1.ListRequest) returns (ListKnowledgeDocumentResponse) {
    option (google.api.http) = {
      post: "/ai/admin/document/list"
      body: "*"
    };
  }
  rpc UpdateDocumentStatus (UpdateDocumentStatusRequest) returns (ai.common.v1.AiKnowledgeDocument) {
    option (google.api.http) = {
      put: "/ai/admin/document/{id}/status"
      body: "*"
    };
  }
  rpc UpdateKnowledgeDocument (ai.common.v1.AiKnowledgeDocument) returns (UpsertDocumentResponse) {
    option (google.api.http) = {
      put: "/ai/admin/document/{id}"
      body: "*"
    };
  }

  // Knowledge Document Segment
  rpc GetKnowledgeSegment (SimpleRequest) returns (ai.common.v1.AiKnowledgeSegment) {
    option (google.api.http) = {
      get: "/ai/admin/segment/{id}"
    };
  }

  rpc ListKnowledgeSegments (.common.v1.ListRequest) returns (ListKnowledgeSegmentResponse) {
    option (google.api.http) = {
      post: "/ai/admin/segment/list"
      body: "*"
    };
  }

  // Image
  rpc ListImage (.common.v1.ListRequest) returns (ListImageResponse) {
    option (google.api.http) = {
      post: "/ai/admin/image/list"
      body: "*"
    };
  };
  rpc UpdateImage (ai.common.v1.AiImage) returns (Image) {
    option (google.api.http) = {
      put: "/ai/admin/image/{id}"
      body: "*"
    };
  }
  rpc BatchDeleteImage (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/image/delete",
      body: "*"
    };
  }
  rpc GetImage(SimpleRequest) returns (Image) {
    option (google.api.http) = {
      get: "/ai/admin/image/{id}"
    };
  }

  // Conversation
  rpc GetChatConversation (SimpleRequest) returns (ChatConversation) {
    option (google.api.http) = {
      get: "/ai/admin/chat/conversation/{id}"
    };
  };

  rpc ListChatConversation (.common.v1.ListRequest) returns (ListChatConversationResponse) {
    option (google.api.http) = {
      post: "/ai/admin/chat/conversation/list"
      body: "*"
    };
  };
  rpc BatchDeleteChatConversation (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/chat/conversation/delete",
      body: "*"
    };
  };

  // Chat Message
  rpc GetChatMessage (SimpleRequest) returns (ChatMessage) {
    option (google.api.http) = {
      get: "/ai/admin/chat/message/{id}"
    };
  };
  rpc ListChatMessage (.common.v1.ListRequest) returns (ListChatMessageResponse) {
    option (google.api.http) = {
      post: "/ai/admin/chat/message/list"
      body: "*"
       };
  };
  rpc BatchDeleteChatMessage (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/chat/message/delete",
      body: "*"
    };
  };

  // Tool
  rpc GetTool(SimpleRequest) returns (ai.common.v1.AiTool) {
    option (google.api.http) = {
      get: "/ai/admin/tool/{id}"
    };
  }
  rpc ListTool (.common.v1.ListRequest) returns (ListToolResponse) {
    option (google.api.http) = {
      post: "/ai/admin/tool/list"
      body: "*"
    };
  }
  rpc DeleteTool (SimpleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/ai/admin/tool/{id}"
    };
  }
  rpc BatchDeleteTool (BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/tool/delete",
      body: "*"
    };
  }
  rpc CreateTool (ai.common.v1.AiTool) returns (ai.common.v1.AiTool) {
    option (google.api.http) = {
      post: "/ai/admin/tool"
      body: "*"
    };
  }
  rpc UpdateTool (ai.common.v1.AiTool) returns (ai.common.v1.AiTool) {
    option (google.api.http) = {
      put: "/ai/admin/tool/{id}"
      body: "*"
    };
  }

  // Task
  rpc GetQueueMetrics(google.protobuf.Empty) returns (.common.v1.QueueMetricsResponse) {
    option (google.api.http) = {
      get: "/ai/admin/queue/metrics",
    };
  }

  rpc ListTasks(.common.v1.ListRequest) returns (.common.v1.ListTaskResponse) {
    option (google.api.http) = {
      post: "/ai/admin/queue",
      body: "*",
    };
  }

  rpc GetTask(SimpleRequest) returns (.common.v1.GetTaskResponse) {
    option (google.api.http) = {
      get: "/ai/admin/queue/{id}",
    };
  }

  rpc BatchDeleteTasks(BatchDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/queue/batch/delete",
      body: "*"
    };
  }

  rpc CleanupTask(.common.v1.CleanupTaskRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/ai/admin/queue/cleanup",
      body: "*",
    };
  }
}

message SimpleRequest {
  int64 id = 1;
}

message BatchCreateResponse {
  repeated ai.common.v1.AiKnowledgeDocument documents = 1;
  int64 total = 2;
}

message BatchDeleteRequest {
  repeated int64 ids = 1;
  bool force = 2;
}

// Api Key
message ListApikeyResponse {
   repeated ai.common.v1.AiApiKey api_keys = 1;
  .common.v1.PaginationResults pagination = 2;
}

// Model
message ListModelResponse {
  repeated ai.common.v1.AiModel models = 1;
  .common.v1.PaginationResults pagination = 2;
}

//Role
message Role {
  ai.common.v1.AiChatRole role = 1;
  .common.v1.UserInfo owner_info = 2;
}
message ListRoleResponse {
  repeated Role roles = 1;
  .common.v1.PaginationResults pagination = 2;
}

message BatchDeleteRoleRequest {
  repeated int64 ids = 1;
  bool force = 2;
}

// Knowledge
message ListKnowledgeResponse {
  repeated Knowledge knowledges = 1;
  .common.v1.PaginationResults pagination = 2;
}

message Knowledge {
  common.v1.AiKnowledge knowledge = 1;
  .common.v1.UserInfo owner_info = 2;
}

// Knowledge Document
message ListKnowledgeDocumentResponse {
  repeated ai.common.v1.AiKnowledgeDocument documents = 1;
  .common.v1.PaginationResults pagination = 2;
}

message BatchCreateKnowledgeDocumentRequest {
  int64 knowledge_id = 1;
  int32 segment_max_tokens = 2;
  repeated DocumentRequest documents = 3;
}
message DocumentRequest {
  string name = 1;
  string url = 2;
}

message UpdateDocumentStatusRequest {
  int64 id = 1;
  string status = 2;
}

message UpsertDocumentResponse {
  ai.common.v1.AiKnowledgeDocument document = 1;
  int64 task_id = 2;
}

// Knowledge Document Segment
message ListKnowledgeSegmentResponse {
  repeated ai.common.v1.AiKnowledgeSegment segments = 1;
  .common.v1.PaginationResults pagination = 2;
}

// Image
message Image {
  common.v1.AiImage image = 1;
  .common.v1.UserInfo owner_info = 2;
}

message ListImageResponse {
  repeated Image images = 1;
  .common.v1.PaginationResults pagination = 2;
}

message UpdateImageStatusRequest {
  int64 id = 1;
  string status= 2;
}

// Conversation
message ChatConversation {
  common.v1.AiChatConversation conversation = 1;
  .common.v1.UserInfo owner_info = 2;
}

message ListChatConversationResponse {
  repeated ChatConversation conversations = 1;
  .common.v1.PaginationResults pagination = 2;
}

// Chat Message
message ChatMessage {
  common.v1.AiChatMessage message = 1;
  .common.v1.UserInfo owner_info = 2;
}

message ListChatMessageResponse {
  repeated ChatMessage messages = 1;
  .common.v1.PaginationResults pagination = 2;
}

// Tool
message ListToolResponse {
  repeated ai.common.v1.AiTool tools = 1;
  .common.v1.PaginationResults pagination = 2;
}
