endpoints:
  - path: /api/v1/file/*
    protocol: HTTP
    backends:
      - target: 'discovery:///cloudyst-file'
    middlewares:
      - name: rewrite
        options:
          '@type': type.googleapis.com/gateway.middleware.rewrite.v1.Rewrite
          strip_prefix: "/api/v1/file"

  - path: /api/v1/user/*
    protocol: HTTP
    backends:
      - target: 'discovery:///cloudyst-user'
    middlewares:
      - name: rewrite
        options:
          '@type': type.googleapis.com/gateway.middleware.rewrite.v1.Rewrite
          strip_prefix: "/api/v1/user"

  - path: /api/v1/ai/*
    protocol: HTTP
    backends:
      - target: 'discovery:///cloudyst-ai'
    middlewares:
      - name: rewrite
        options:
          '@type': type.googleapis.com/gateway.middleware.rewrite.v1.Rewrite
          strip_prefix: "/api/v1/user"


  - path: /files.Greeter/*
    method: POST
    protocol: GRPC
    backends:
      - target: '127.0.0.1:9000'
    retry:
      attempts: 3
      perTryTimeout: 0.5s
      conditions:
        - byStatusCode: '502-504'
        - byHeader:
            name: 'Grpc-Status'
            value: '14'
